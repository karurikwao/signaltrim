description = "Drop the always-on signaltrim activation rule into the current repo for every IDE agent"
prompt = "Write the per-repo signaltrim rule files into the current repo and report the result. If `src/tools/signaltrim-init.js` exists in the current repo (a signaltrim checkout), run `node src/tools/signaltrim-init.js {{args}}`. Otherwise run the standalone script (self-contained, supports stdin execution): `curl -fsSL https://raw.githubusercontent.com/karurikwao/signaltrim/main/src/tools/signaltrim-init.js | node - {{args}}`. Use --dry-run first if the user did not pass --force, so we never silently overwrite an existing rule file."
