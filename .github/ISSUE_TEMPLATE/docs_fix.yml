name: Docs fix
description: Report missing, stale, or confusing documentation.
labels: ["documentation", "good first issue"]
body:
  - type: textarea
    id: page
    attributes:
      label: Page or section
      description: Link the page or name the section.
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What is wrong?
      description: Describe the confusing, stale, or missing doc.
    validations:
      required: true
  - type: textarea
    id: suggested
    attributes:
      label: Suggested fix
      description: Optional wording, command, or link.
    validations:
      required: false
