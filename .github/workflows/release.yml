name: Release Artifacts

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify release tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          set -euo pipefail
          version="$(node -p "require('./package.json').version")"
          expected="v${version}"
          if [[ "${GITHUB_REF_NAME}" != "${expected}" ]]; then
            echo "::error::Tag ${GITHUB_REF_NAME} does not match package.json version ${version}; expected ${expected}"
            exit 1
          fi

      - name: Verify before packaging
        run: |
          npm test
          npm run smoke
          npm run test:standalone
          npm run check:install-surfaces
          npm run test:python
          npm run verify

      - name: Build release archives
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/release
          version="$(node -p "require('./package.json').version")"
          npm pack --pack-destination dist/release
          git archive --format=tar.gz --prefix="signaltrim-${version}/" -o "dist/release/signaltrim-${version}-source.tar.gz" HEAD
          git archive --format=zip --prefix="signaltrim-${version}/" -o "dist/release/signaltrim-${version}-source.zip" HEAD
          node scripts/build-release-artifacts.cjs
          node - <<'NODE'
          const crypto = require('crypto');
          const fs = require('fs');
          const path = require('path');
          const dir = 'dist/release';
          const lines = [];
          for (const name of fs.readdirSync(dir).sort()) {
            if (name.endsWith('.sha256')) continue;
            const file = path.join(dir, name);
            if (!fs.statSync(file).isFile()) continue;
            const hash = crypto.createHash('sha256').update(fs.readFileSync(file)).digest('hex');
            lines.push(`${hash}  ${name}`);
          }
          fs.writeFileSync(path.join(dir, 'checksums.sha256'), lines.join('\n') + '\n');
          NODE

      - name: Smoke release artifacts
        shell: bash
        run: |
          set -euo pipefail
          version="$(node -p "require('./package.json').version")"
          tmp="$(mktemp -d)"
          npm install --global --prefix "$tmp/prefix" "$PWD/dist/release/signaltrim-${version}.tgz"
          "$tmp/prefix/bin/signaltrim" --help >/dev/null
          "$tmp/prefix/bin/signaltrim" --list >/dev/null

          set +e
          out="$("$tmp/prefix/bin/signaltrim-shrink" 2>&1)"
          code=$?
          set -e
          if [[ "$code" -ne 2 || "$out" != *"missing upstream command"* ]]; then
            echo "::error::signaltrim-shrink package smoke failed"
            printf '%s\n' "$out"
            exit 1
          fi

          mkdir "$tmp/bundle"
          tar -xzf "dist/release/signaltrim-${version}-linux-x64.tar.gz" -C "$tmp/bundle"
          "$tmp/bundle/signaltrim-${version}-linux-x64/signaltrim" --help >/dev/null

      - name: Prepare GitHub release notes
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          set -euo pipefail
          version="$(node -p "require('./package.json').version")"
          node - "$version" <<'NODE'
          const fs = require('fs');
          const version = process.argv[2];
          const changelog = fs.readFileSync('CHANGELOG.md', 'utf8');
          const marker = `## [${version}]`;
          const start = changelog.indexOf(marker);
          if (start === -1) throw new Error(`CHANGELOG.md missing ${marker}`);
          const rest = changelog.slice(start);
          const next = rest.slice(marker.length).search(/\n## \[/);
          const section = next === -1 ? rest : rest.slice(0, marker.length + next);
          fs.writeFileSync('dist/release/release-notes.md', section.trim() + '\n');
          NODE

      - name: Upload artifact bundle
        uses: actions/upload-artifact@v4
        with:
          name: signaltrim-release-artifacts
          if-no-files-found: error
          path: |
            dist/release/*.tgz
            dist/release/*.tar.gz
            dist/release/*.zip
            dist/release/*.sha256

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          shopt -s nullglob
          assets=(dist/release/*.tgz dist/release/*.tar.gz dist/release/*.zip dist/release/*.sha256)
          if (( ${#assets[@]} != 7 )); then
            echo "::error::Expected 7 release assets, got ${#assets[@]}"
            printf '%s\n' "${assets[@]}"
            exit 1
          fi
          gh release create "$tag" "${assets[@]}" \
            --verify-tag \
            --title "SignalTrim ${tag}" \
            --notes-file dist/release/release-notes.md
