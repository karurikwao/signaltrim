name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run Node installer tests
        run: npm test

      - name: Run CLI smoke tests
        run: npm run smoke

      - name: Run standalone JS tests
        run: npm run test:standalone

      - name: Check install surfaces
        run: npm run check:install-surfaces

      - name: Run Python unit tests
        run: npm run test:python

      - name: Run repository verification
        run: npm run verify
